#
# ── Template parameters (supplied via --set-string) ──────────────────
#
#   workflow_name  Unique OSMO workflow instance name.
#                  Default: "hand-reconstruction" (see default-values).
#   experiment_id  Folder name of the experiment to process. Appended to
#                  source_url for input; namespaces the output under dest_url.
#                  Must contain at least one .mp4 video file.
#   source_url     S3 URL prefix for source data. Each experiment is fetched
#                  from <source_url>/<experiment_id>.
#   dest_url       S3 URL where final outputs are uploaded. Results land at
#                  <dest_url>/<experiment_id>/…
#   assets_url     S3 URL for shared reconstruction assets. Must contain
#                  MANO_RIGHT.pkl and a BMC/ directory.
#   vipe_image     Container image for the ViPE inference task.
#   dynhamr_image  Container image for the Dyn-HaMR reconstruction task.
# ─────────────────────────────────────────────────────────────────────

workflow:
  name: "{{workflow_name}}"

  resources:
    default:
      cpu: 15
      gpu: 1
      memory: 100Gi
      storage: 200Gi

  tasks:
  - name: vipe-infer
    image: "{{vipe_image}}"
    command: ["bash", "-c"]
    args:
    - |
      set -euo pipefail

      INPUT_DIR="{{input:0}}"
      EXPERIMENT_ID="{{experiment_id}}"
      VIDEO_PATH="$(find "${INPUT_DIR}" -name '*.mp4' -type f | head -1)"
      if [ -z "${VIDEO_PATH}" ]; then
        echo "ERROR: No .mp4 file found under ${INPUT_DIR}"
        find "${INPUT_DIR}" -type f
        exit 1
      fi
      VIDEO_FILE="$(basename "${VIDEO_PATH}")"
      VIDEO_NAME="${VIDEO_FILE%.*}"

      echo "Experiment: ${EXPERIMENT_ID}"
      echo "Using video: ${VIDEO_FILE}"
      echo "Video stem: ${VIDEO_NAME}"

      mkdir -p /home/appuser/ViPE/vipe_results
      cp "${VIDEO_PATH}" "/home/appuser/ViPE/vipe_results/${VIDEO_FILE}"

      cd /home/appuser/ViPE
      vipe infer "vipe_results/${VIDEO_FILE}"

      mkdir -p "{{output}}"
      cp "${VIDEO_PATH}" "{{output}}/${VIDEO_FILE}"
      cp -r /home/appuser/ViPE/vipe_results/* "{{output}}/"
      echo "${VIDEO_FILE}" > "{{output}}/video_file.txt"
      echo "${VIDEO_NAME}" > "{{output}}/video_name.txt"
      cp "${INPUT_DIR}/"*.hdf5 "{{output}}/" 2>/dev/null || true

      echo "ViPE task complete"
    inputs:
    - url: "{{source_url}}/{{experiment_id}}"

  - name: dynhamr-reconstruct
    image: "{{dynhamr_image}}"
    command: ["bash", "-c"]
    args:
    - |
      set -euo pipefail

      PIPELINE_INPUT="{{input:0}}"
      ASSETS_DIR="{{input:1}}"

      VIDEO_FILE="$(cat "${PIPELINE_INPUT}/video_file.txt")"
      VIDEO_NAME="$(cat "${PIPELINE_INPUT}/video_name.txt")"
      EXPERIMENT_ID="{{experiment_id}}"

      echo "Reconstructing: ${VIDEO_FILE} (experiment: ${EXPERIMENT_ID})"

      mkdir -p /home/appuser/outputs
      cp -r "${PIPELINE_INPUT}/"* /home/appuser/outputs/

      # Required assets for Dyn-HaMR setup script.
      if [ -f "${ASSETS_DIR}/MANO_RIGHT.pkl" ]; then
        cp "${ASSETS_DIR}/MANO_RIGHT.pkl" /home/appuser/outputs/MANO_RIGHT.pkl
      else
        echo "ERROR: Missing ${ASSETS_DIR}/MANO_RIGHT.pkl"
        exit 1
      fi

      if [ -d "${ASSETS_DIR}/BMC" ]; then
        mkdir -p /home/appuser/outputs/BMC
        cp -r "${ASSETS_DIR}/BMC/"* /home/appuser/outputs/BMC/
      else
        echo "ERROR: Missing ${ASSETS_DIR}/BMC directory"
        exit 1
      fi

      # Replicate the local dual volume-mount that maps $PROJECT_ROOT/outputs
      # to both /home/appuser/outputs AND /home/appuser/Dyn-HaMR/outputs.
      # Dyn-HaMR writes logs to ../outputs/logs (relative to dyn-hamr/),
      # i.e. /home/appuser/Dyn-HaMR/outputs/logs.
      rm -rf /home/appuser/Dyn-HaMR/outputs
      ln -sf /home/appuser/outputs /home/appuser/Dyn-HaMR/outputs

      bash /home/appuser/setup_dynhamr.sh

      ln -sf "/home/appuser/outputs/${VIDEO_FILE}" "/home/appuser/Dyn-HaMR/test/videos/${VIDEO_FILE}"
      echo "Linked video into Dyn-HaMR test/videos"

      cd /home/appuser/Dyn-HaMR/dyn-hamr
      python run_opt.py \
        data=video_vipe \
        run_opt=True \
        run_vis=True \
        data.seq="${VIDEO_NAME}" \
        is_static=False

      # Write results under <experiment_id>/ so that OSMO uploads them to
      # <results_url>/<experiment_id>/… preserving the per-experiment layout.
      OUTPUT_DIR="{{output}}/${EXPERIMENT_ID}"
      mkdir -p "${OUTPUT_DIR}"
      if [ -d /home/appuser/outputs/logs ]; then
        LOGS_SRC="/home/appuser/outputs/logs"
        LOGS_DEST="${OUTPUT_DIR}/logs"
        COPIED=0

        # Copy only essential files from each run directory.
        # Structure: logs/video-custom/<date>/<run_name>/
        for RUN_DIR in "${LOGS_SRC}"/video-custom/*/*/; do
          [ -d "${RUN_DIR}" ] || continue
          REL_DIR="${RUN_DIR#${LOGS_SRC}/}"
          DEST_RUN="${LOGS_DEST}/${REL_DIR}"
          mkdir -p "${DEST_RUN}/smooth_fit"

          cp "${RUN_DIR}/smooth_fit/"*_000300_world_results.npz "${DEST_RUN}/smooth_fit/" 2>/dev/null && COPIED=$((COPIED+1))
          cp "${RUN_DIR}/cameras.json" "${DEST_RUN}/" 2>/dev/null && COPIED=$((COPIED+1))
          cp "${RUN_DIR}/track_info.json" "${DEST_RUN}/" 2>/dev/null && COPIED=$((COPIED+1))
          cp ${RUN_DIR}/*_smooth_fit*grid*.mp4 "${DEST_RUN}/" 2>/dev/null && COPIED=$((COPIED+1))
          cp ${RUN_DIR}/*_src_cam.mp4 "${DEST_RUN}/" 2>/dev/null && COPIED=$((COPIED+1))
          cp -r "${RUN_DIR}/qc_results" "${DEST_RUN}/" 2>/dev/null && COPIED=$((COPIED+1))
        done

        COPIED=$(find "${LOGS_DEST}" -type f 2>/dev/null | wc -l)
        if [ "${COPIED}" -gt 0 ]; then
          echo "Selectively copied ${COPIED} essential output files to ${LOGS_DEST}"
        else
          echo "WARN: no essential files found; copying all logs as fallback"
          cp -r "${LOGS_SRC}" "${OUTPUT_DIR}/"
        fi
      fi
      if [ -d /home/appuser/outputs/vipe_results ]; then
        cp -r /home/appuser/outputs/vipe_results "${OUTPUT_DIR}/"
      fi
      # Save the original sensor data.
      cp /home/appuser/outputs/*.hdf5 "${OUTPUT_DIR}/" 2>/dev/null || true
      echo "${VIDEO_FILE}" > "${OUTPUT_DIR}/video_file.txt"
      echo "${VIDEO_NAME}" > "${OUTPUT_DIR}/video_name.txt"

      # Jumpy-hand QC on reconstruction results
      echo "Running jumpy-hand QC on ${OUTPUT_DIR} ..."
      cd /home/appuser
      bash run_jumpy_qc.sh "${OUTPUT_DIR}" || echo "WARN: jumpy QC failed (non-fatal)"

      echo "Dyn-HaMR task complete for experiment: ${EXPERIMENT_ID}"
    inputs:
    - task: vipe-infer
    - url: "{{assets_url}}"
    outputs:
    - url: "{{dest_url}}"

default-values:
  workflow_name: hand-reconstruction
